<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Dictionary App</title>
    <link rel="stylesheet" href="style.css">
</head>

<body>
    <main>
        <div class="search-box">
            <h1>Dictionary App</h1>
            <div class="box-input">
                <div class="border">
                    <input type="text" name="text" class="input" placeholder="Enter a word...">
                </div>
            </div>
            <div class="btn">
                <button>
                    <span class="text">Search</span>
                </button>
            </div>
        </div>
    </main>
</body>

</html>
